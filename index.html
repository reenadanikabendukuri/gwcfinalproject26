<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Page 1</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <div class="pomodoro">
    <div class="title">
      <h1 style="color: #FCF6F5; transform: translateX(87px);" >Pomodoro Timer</h1>
      <h2 style="color: #FCF6F5; transform: translateX(135px);">⋆｡‧˚ʚ🍅ɞ˚‧｡⋆</h2>
    </div>
 
    <div class="completed">
      <h3 style="color: #000000; transform: translateX(95px);">Completed Pomodoros: <span id="session-count">0</span></h3> 
    </div>
 
    <div class="modebuttons">
      <button class="tab active" data-mode="pomodoro" style="color: #000000; transform: translateX(17px);" >Focus</button>
      <button class="tab" data-mode="short" style="color: #000000; transform: translateX(17px);">Short Break</button>
      <button class="tab" data-mode="long" style="color: #000000; transform: translateX(17px);">Long Break</button>
    </div>
 
    <div class="focus" id="time-display" style="color: #F5F0CD; transform: translateX(117px); font-family: 'Lucida Console', 'Courier New', monospace; font-size: 70px; font-weight: bold;">
      25:00
    </div>
 
    <div class="start_stop_restart">
      <button class="btn-action" id="start-btn" style= "transform: translateX(55px)">START</button>
      <button class="btn-action" id="pause-btn" style= "transform: translateX(55px)">PAUSE</button>
      <button class="restart" id="reset-btn" style= "transform: translateX(55px)">RESTART</button>
    </div>
    
    <h4 style = "transform: translateY(300px) translateX(95px)">click to change background</h3>
      <button onclick="changeColor('#B2C9AD')"; style = "transform: translateY(300px)">Green</button>
      <button onclick="changeColor('#e8dfce')"; style = "transform: translateY(300px)">Cream</button>
      <button onclick="changeColor('white')"; style = "transform: translateY(300px)">Minimalist</button>
      <button onclick="changeColor('#7b9acc')"; style = "transform: translateY(300px)">Reset</button>

    <script>
      function changeColor(color) 
      {
        document.body.style.backgroundColor = color;
        const timerColors = {
          '#B2C9AD':'#FFD5D5',
          '#e8dfce':'#7e8e65',
          'white':'black',
          '#7b9acc':'#F5F0CD'
        };
        document.getElementById('time-display').style.color = timerColors[color];
      }
    </script>

    <div class="credits"> 
      <p style="color: #000000; transform: translateY(300px) translateX(3px)">Pomodoro Timer By Reena Danika Bendukuri for GWC</p>
    </div>
    
    <div class="task-panel">
    <h2>Tasks <span class="count" id="task-count">0</span></h2>
      <div class="task-input-row">
        <input class="task-input" id="task-input" type="text" placeholder="Add a task..." maxlength="60" />
        <button class="add-btn" id="add-task-btn">+</button>
      </div>
      <div class="task-list" id="task-list"></div>
    </div>


  </div>
<script src="script.js"></script>
</body>
</html>
